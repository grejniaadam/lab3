<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ subject }}</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f7f7f7; color: #333; }
      .container { background: #ffffff; margin: 0 auto; padding: 24px; max-width: 600px; }
      .button { display: inline-block; padding: 12px 20px; background: #1a73e8; color: white; text-decoration: none; border-radius: 4px; }
      .footer { margin-top: 24px; font-size: 12px; color: #777; }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>{{ title }}</h1>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
      <footer class="footer">
        <p>{{ footer_text or "Thank you for using Mailer." }}</p>
      </footer>
    </div>
  </body>
</html>
